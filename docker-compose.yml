version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: swiftadmin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-123456}'
      MYSQL_DATABASE: '${DB_DATABASE:-swiftadmin}'
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/install.sql:/docker-entrypoint-initdb.d/01-install.sql:ro
    ports:
      - '${DB_PORT:-3306}:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: swiftadmin-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      target: production
    image: swiftadmin:latest
    container_name: swiftadmin-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app_runtime:/var/www/html/runtime
      - app_uploads:/var/www/html/public/uploads
      - app_static:/var/www/html/public/static
      - app_admin:/var/www/html/public/admin
      - ./.env.docker:/var/www/html/.env:ro
    environment:
      APP_DEBUG: '${APP_DEBUG:-false}'

  nginx:
    image: nginx:1.25-alpine
    container_name: swiftadmin-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_uploads:/var/www/html/public/uploads:ro
      - app_static:/var/www/html/public/static:ro
      - app_admin:/var/www/html/public/admin:ro

volumes:
  mysql_data:
  redis_data:
  app_runtime:
  app_uploads:
  app_static:
  app_admin:
