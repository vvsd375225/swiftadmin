openapi: "3.0.3"
info:
  title: SwiftAdmin API v1
  description: SwiftAdmin 管理后台统一接口文档
  version: "1.0.0"
  contact:
    name: SwiftAdmin Team
servers:
  - url: http://127.0.0.1:8000/api.php
    description: 本地开发环境

paths:
  /v1/auth/login:
    post:
      tags: [认证 Auth]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: 用户名或邮箱
                password:
                  type: string
                  description: 密码
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 0 }
                  msg: { type: string, example: success }
                  data:
                    type: object
                    properties:
                      token: { type: string, description: JWT Token }
                      user: { type: object, description: 用户信息 }

  /v1/auth/profile:
    get:
      tags: [认证 Auth]
      summary: 获取用户信息
      parameters:
        - name: token
          in: header
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 成功

  /v1/article/index:
    get:
      tags: [文章 Article]
      summary: 文章列表
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer }
                  data:
                    type: object
                    properties:
                      list: { type: array }
                      total: { type: integer }

  /v1/article/detail/{id}:
    get:
      tags: [文章 Article]
      summary: 文章详情
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功

  /v1/notification/index:
    get:
      tags: [消息 Notification]
      summary: 消息列表
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: token
          in: header
          schema: { type: string }
      responses:
        '200':
          description: 成功

  /v1/notification/unread:
    get:
      tags: [消息 Notification]
      summary: 未读消息数
      parameters:
        - name: token
          in: header
          schema: { type: string }
      responses:
        '200':
          description: 成功

  /v1/notification/read/{id}:
    post:
      tags: [消息 Notification]
      summary: 标记已读
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: token
          in: header
          schema: { type: string }
      responses:
        '200':
          description: 成功

  /v1/notification/readall:
    post:
      tags: [消息 Notification]
      summary: 全部已读
      parameters:
        - name: token
          in: header
          schema: { type: string }
      responses:
        '200':
          description: 成功

  /v1/notification/delete/{id}:
    delete:
      tags: [消息 Notification]
      summary: 删除消息
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: token
          in: header
          schema: { type: string }
      responses:
        '200':
          description: 成功
