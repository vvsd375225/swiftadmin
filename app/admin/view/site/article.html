<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{$pageTitle}</title>
    <meta name="keywords" content="{$article.seo_keywords ?? ''}">
    <meta name="description" content="{$article.seo_description ?? $article.summary ?? ''}">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f5f7fa; color:#333; }
        a { text-decoration:none; color:inherit; }
        .header { background:linear-gradient(135deg, #18A058 0%, #0d7a3e 100%); padding:0 40px; display:flex; align-items:center; justify-content:space-between; height:64px; }
        .logo { font-size:24px; font-weight:700; color:#fff; }
        .nav { display:flex; gap:8px; }
        .nav a { color:rgba(255,255,255,.85); padding:8px 16px; border-radius:6px; }
        .nav a:hover { background:rgba(255,255,255,.15); color:#fff; }
        .btn-outline { color:#fff; border:1px solid rgba(255,255,255,.5); padding:8px 20px; border-radius:6px; }
        .container { max-width:800px; margin:40px auto; padding:0 20px; }
        .article-header { background:#fff; border-radius:12px; padding:40px; margin-bottom:24px; text-align:center; border:1px solid #eee; }
        .article-header h1 { font-size:28px; margin-bottom:16px; }
        .article-header .meta { color:#999; font-size:14px; }
        .article-header .meta span { margin:0 8px; }
        .article-body { background:#fff; border-radius:12px; padding:40px; line-height:1.8; font-size:16px; border:1px solid #eee; }
        .article-body img { max-width:100%; height:auto; border-radius:8px; margin:16px 0; }
        .article-body p { margin-bottom:16px; }
        .article-body h2,.article-body h3 { margin:24px 0 12px; }
        .back-link { display:block; text-align:center; margin:24px 0; color:#18A058; }
        .footer { background:#1a1a2e; color:rgba(255,255,255,.6); text-align:center; padding:32px; margin-top:60px; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="logo">SwiftAdmin</a>
        <nav class="nav">
            <a href="/">首页</a>
            {foreach $nav as $n}
            <a href="/category/{$n.id}">{$n.name}</a>
            {/foreach}
        </nav>
        <a href="/admin" class="btn-outline">管理后台</a>
    </header>

    <div class="container">
        <div class="article-header">
            <h1>{$article.title}</h1>
            <div class="meta">
                {if $article.category_name}<span>{$article.category_name}</span>{/if}
                <span>{$article.publish_time}</span>
            </div>
        </div>
        <div class="article-body">{$article.content|raw}</div>
        <a href="/category/{$article.category_id}" class="back-link">&larr; 返回栏目</a>
    </div>

    <footer class="footer"><p>Powered by SwiftAdmin &copy; 2026</p></footer>
</body>
</html>
